name: Lint and Format

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Rust Lint and Format Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        components: rustfmt, clippy

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libspeechd-dev libclang-dev

    - name: Run rustfmt check
      run: cargo fmt --all -- --check

    - name: Run clippy (Linux-compatible features)
      # `sapi` and `avsynth` are platform-gated; on Linux we lint the union
      # of features that actually build here.
      run: |
        cargo clippy --no-default-features --features system,cloud,sherpaonnx --all-targets -- -D warnings

    - name: Formatting standards summary
      run: |
        echo "## Formatting Standards" >> $GITHUB_STEP_SUMMARY
        echo "- Standard: rustfmt with default settings" >> $GITHUB_STEP_SUMMARY
        echo "- Line width: 100 characters" >> $GITHUB_STEP_SUMMARY
        echo "- Indent: 4 spaces" >> $GITHUB_STEP_SUMMARY
        echo "- No trailing whitespace" >> $GITHUB_STEP_SUMMARY
        echo "- No unused imports or variables" >> $GITHUB_STEP_SUMMARY
        echo "- Use \`cargo fmt\` to format before committing" >> $GITHUB_STEP_SUMMARY
