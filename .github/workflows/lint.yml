name: Lint and Format

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Rust Lint and Format Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        components: rustfmt, clippy

    - name: Run rustfmt check
      run: |
        cargo fmt --all -- --check
      continue-on-error: false

    - name: Run clippy
      run: |
        cargo clippy --all-targets --all-features -- -D warnings
      continue-on-error: false

    - name: Check formatting standards
      run: |
        echo "## Formatting Standards" >> $GITHUB_STEP_SUMMARY
        echo "- Standard: rustfmt with default settings" >> $GITHUB_STEP_SUMMARY
        echo "- Line width: 100 characters" >> $GITHUB_STEP_SUMMARY
        echo "- Indent: 4 spaces" >> $GITHUB_STEP_SUMMARY
        echo "- No trailing whitespace" >> $GITHUB_STEP_SUMMARY
        echo "- No unused imports or variables" >> $GITHUB_STEP_SUMMARY
        echo "- Use \`cargo fmt\` to format before committing" >> $GITHUB_STEP_SUMMARY
