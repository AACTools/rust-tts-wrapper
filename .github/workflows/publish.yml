name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Sync version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Update Cargo.toml version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: version-sync
          path: Cargo.toml

  test:
    name: Test
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: version-sync
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libspeechd-dev libclang-dev
      - name: Clippy (Linux features)
        run: cargo clippy --no-default-features --features system,cloud -- -D warnings
      - name: Test (Linux features)
        run: cargo test --no-default-features --features system,cloud
      - name: Clippy (Linux + sherpaonnx)
        continue-on-error: true  # sherpa-onnx 504 download issue (see TODO.md)
        run: cargo clippy --no-default-features --features system,cloud,sherpaonnx -- -D warnings
      - name: Build system-only
        run: cargo build --no-default-features --features system
      - name: Build cloud-only
        run: cargo build --no-default-features --features cloud

  build:
    name: Build ${{ matrix.label }}
    needs: test
    # Per-matrix-entry: sherpa-onnx builds may fail due to upstream 504
    # download issues (see TODO.md). Core builds are strict.
    continue-on-error: ${{ matrix.allow_failure == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Core builds (strict: failures block the release) ---
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            features: "system,cloud"
            label: "system-cloud-x86_64-linux"
            lib_ext: so
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            features: "cloud"
            label: "cloud-aarch64-linux"
            lib_ext: so
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            features: "avsynth,cloud"
            label: "avsynth-cloud-x86_64-macos"
            lib_ext: dylib
          - target: aarch64-apple-darwin
            os: macos-latest
            features: "avsynth,cloud"
            label: "avsynth-cloud-aarch64-macos"
            lib_ext: dylib
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            features: "sapi,cloud"
            label: "sapi-cloud-x86_64-windows"
            lib_ext: dll
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            features: "sapi,cloud"
            label: "sapi-cloud-aarch64-windows"
            lib_ext: dll

          # --- Sherpa-onnx builds (non-blocking: 504 download may fail) ---
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            features: "system,cloud,sherpaonnx"
            label: "system-cloud-sherpaonnx-x86_64-linux"
            lib_ext: so
            allow_failure: true
          - target: x86_64-apple-darwin
            os: macos-latest
            features: "avsynth,cloud,sherpaonnx"
            label: "avsynth-cloud-sherpaonnx-x86_64-macos"
            lib_ext: dylib
            allow_failure: true
          - target: aarch64-apple-darwin
            os: macos-latest
            features: "avsynth,cloud,sherpaonnx"
            label: "avsynth-cloud-sherpaonnx-aarch64-macos"
            lib_ext: dylib
            allow_failure: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            features: "sapi,cloud,sherpaonnx"
            label: "sapi-cloud-sherpaonnx-x86_64-windows"
            lib_ext: dll
            allow_failure: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: version-sync
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --locked
      - name: Install native deps (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y libspeechd-dev libclang-dev
      - name: Build release (cargo)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}
      - name: Build release (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}
      - name: Rename artifacts
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          LABEL="${{ matrix.label }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp rust_tts_wrapper.dll "rust_tts_wrapper-${LABEL}.dll" 2>/dev/null || true
            cp rust_tts_wrapper.lib "rust_tts_wrapper-${LABEL}.lib" 2>/dev/null || true
          else
            cp librust_tts_wrapper.${{ matrix.lib_ext }} "librust_tts_wrapper-${LABEL}.${{ matrix.lib_ext }}" 2>/dev/null || true
            cp librust_tts_wrapper.a "librust_tts_wrapper-${LABEL}.a" 2>/dev/null || true
          fi
      - name: Upload shared library
        uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.label }}
          path: target/${{ matrix.target }}/release/*rust_tts_wrapper-${{ matrix.label }}.${{ matrix.lib_ext }}
      - name: Upload static library (non-Windows)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: static-${{ matrix.label }}
          path: target/${{ matrix.target }}/release/*rust_tts_wrapper-${{ matrix.label }}.a
      - name: Upload import library (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: static-${{ matrix.label }}
          path: target/${{ matrix.target }}/release/*rust_tts_wrapper-${{ matrix.label }}.lib

  nuget:
    name: Pack & Publish .NET NuGet
    needs: build
    runs-on: windows-latest
    # Don't block the release if NuGet packing fails — it's additive.
    continue-on-error: true
    # Trusted Publishing: NuGet.org verifies the GitHub OIDC token instead
    # of requiring an API key. The environment name must match what was
    # configured on nuget.org's Trusted Publishing page.
    environment: nuget
    permissions:
      id-token: write  # Required for OIDC token exchange
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: lib-sapi-cloud-x86_64-windows
          path: native
      - name: Place native DLL for packaging
        shell: pwsh
        run: |
          $dll = Get-ChildItem native/*.dll | Select-Object -First 1
          if ($dll) {
            New-Item -ItemType Directory -Force -Path target/release
            Copy-Item $dll.FullName target/release/rust_tts_wrapper.dll
            Write-Host "Placed $($dll.Name) → target/release/rust_tts_wrapper.dll"
          } else {
            Write-Host "No Windows DLL found — packing managed-only"
          }
      - uses: actions/setup-dotnet@v4
        with:
          # .NET 9 SDK is required for OIDC Trusted Publishing support
          # in `dotnet nuget push`. The project still targets net8.0.
          dotnet-version: '9.0.x'
      - name: Pack
        # Pass the version from the git tag (e.g. v0.2.3 → 0.2.3)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          Write-Host "Packing version $version"
          dotnet pack bindings/dotnet/RustTtsWrapper.Bindings.csproj -c Release -p:Version=$version
      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: bindings/dotnet/bin/Release/*.nupkg
      - name: Publish to NuGet
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        # Supports both Trusted Publishing (OIDC) and API key auth.
        # If NUGET_API_KEY secret is set, use it. Otherwise rely on
        # OIDC Trusted Publishing (requires nuget.org configuration).
        run: |
          $pkg = Get-ChildItem bindings/dotnet/bin/Release/*.nupkg | Select-Object -First 1
          if (-not $pkg) { Write-Host "No .nupkg found"; exit 0 }
          Write-Host "Publishing $($pkg.Name)"
          $apiKey = '${{ secrets.NUGET_API_KEY }}'
          if ($apiKey) {
            Write-Host "Using API key authentication"
            dotnet nuget push $pkg.FullName --api-key $apiKey --source https://api.nuget.org/v3/index.json --skip-duplicate
          } else {
            Write-Host "Using Trusted Publishing (OIDC) — no API key set"
            dotnet nuget push $pkg.FullName --source https://api.nuget.org/v3/index.json --skip-duplicate
          }

  release:
    name: GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "{lib-*,static-*}"
          merge-multiple: true
      - name: Organize release assets
        run: |
          mkdir -p release-assets
          cp artifacts/* release-assets/ 2>/dev/null || true
          cp include/tts_wrapper.h release-assets/
          ls -la release-assets/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
          # CHANGED: fail if no artifacts were uploaded — catches broken
          # builds that previously shipped with zero artifacts.
          fail_on_unmatched_files: true
