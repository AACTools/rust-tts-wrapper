name: SherpaOnnx Live Tests

on:
  # Manual trigger only — these tests download ~250 MB of models per
  # platform and would burn CI minutes if run on every push.
  workflow_dispatch:
  # Run on PRs that touch SherpaOnnx code or this workflow itself so
  # regressions surface during development.
  pull_request:
    paths:
      - "src/sherpaonnx_engine.rs"
      - "tests/sherpaonnx_live.rs"
      - ".github/workflows/sherpaonnx-live.yml"
      - "scripts/get-model-url.py"

jobs:
  sherpa-live:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Run on all three platforms to catch platform-specific ONNX runtime
        # issues. Linux is the fastest; macOS/Windows catch ARM differences
        # and COM/threading edge cases.
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libspeechd-dev libclang-dev wget bzip2 tar

      - name: Cache SherpaOnnx models
        # Key on the hash of merged_models.json so any registry update
        # (which could rename or remove a model id) busts the cache and
        # re-downloads. Without this the workflow re-pulled ~250 MB per
        # platform on every PR that touched sherpaonnx_engine.rs.
        uses: actions/cache@v4
        with:
          path: |
            ~/.rust-tts-wrapper/sherpaonnx/piper-uk-lada-low
            ~/.rust-tts-wrapper/sherpaonnx/icefall-fs-ljspeech
            ~/.rust-tts-wrapper/sherpaonnx/kokoro-zh_en-int8-multi
            ~/.rust-tts-wrapper/sherpaonnx/hifigan_v2.onnx
          key: sherpa-models-${{ matrix.os }}-${{ hashFiles('src/merged_models.json') }}
          restore-keys: |
            sherpa-models-${{ matrix.os }}-

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Set model directory and Python helper
        shell: bash
        run: |
          # SherpaOnnx loads from $HOME/.rust-tts-wrapper/sherpaonnx/<model_id>/
          echo "MODEL_DIR=$HOME/.rust-tts-wrapper/sherpaonnx" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/scripts" >> $GITHUB_PATH

      - name: Download VITS test model (piper-uk-lada-low)
        shell: bash
        run: |
          set -e
          mkdir -p "$MODEL_DIR"
          cd "$MODEL_DIR"
          if [ -d "piper-uk-lada-low" ] && [ -n "$(ls -A piper-uk-lada-low 2>/dev/null)" ]; then
            echo "piper-uk-lada-low already present, skipping download"
            exit 0
          fi
          URL=$(get-model-url.py piper-uk-lada-low)
          echo "Downloading $URL"
          wget -q -O piper.tar.bz2 "$URL"
          mkdir -p piper-uk-lada-low
          tar -xjf piper.tar.bz2 -C piper-uk-lada-low --strip-components=1
          rm piper.tar.bz2
          ls -la piper-uk-lada-low/

      - name: Download Matcha test model (icefall-fs-ljspeech)
        shell: bash
        run: |
          set -e
          cd "$MODEL_DIR"
          if [ -d "icefall-fs-ljspeech" ] && [ -n "$(ls -A icefall-fs-ljspeech 2>/dev/null)" ]; then
            echo "icefall-fs-ljspeech already present"
            exit 0
          fi
          URL=$(get-model-url.py icefall-fs-ljspeech)
          echo "Downloading $URL"
          wget -q -O matcha.tar.bz2 "$URL"
          mkdir -p icefall-fs-ljspeech
          tar -xjf matcha.tar.bz2 -C icefall-fs-ljspeech --strip-components=1
          rm matcha.tar.bz2

      - name: Download shared Matcha vocoder (hifigan_v2.onnx)
        # Matcha acoustic models don't bundle a vocoder — they need one in
        # the base model dir (build_matcha_config falls back to it). The
        # vocoder lives in the separate `vocoder-models` release.
        shell: bash
        run: |
          set -e
          cd "$MODEL_DIR"
          if [ -f "hifigan_v2.onnx" ]; then
            echo "hifigan_v2.onnx already present"
            exit 0
          fi
          echo "Downloading hifigan_v2.onnx"
          wget -q -O hifigan_v2.onnx \
            https://github.com/k2-fsa/sherpa-onnx/releases/download/vocoder-models/hifigan_v2.onnx
          ls -la hifigan_v2.onnx

      - name: Download Kokoro test model (kokoro-zh_en-int8-multi)
        # Kokoro is large (~140 MB); only fetch on Linux to keep matrix minutes
        # in check. macOS/Windows still cover VITS + Matcha.
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -e
          cd "$MODEL_DIR"
          if [ -d "kokoro-zh_en-int8-multi" ] && [ -n "$(ls -A kokoro-zh_en-int8-multi 2>/dev/null)" ]; then
            echo "kokoro already present"
            exit 0
          fi
          URL=$(get-model-url.py kokoro-zh_en-int8-multi)
          echo "Downloading $URL"
          wget -q -O kokoro.tar.bz2 "$URL"
          mkdir -p kokoro-zh_en-int8-multi
          tar -xjf kokoro.tar.bz2 -C kokoro-zh_en-int8-multi --strip-components=1
          rm kokoro.tar.bz2

      - name: Run live SherpaOnnx tests
        shell: bash
        run: |
          cargo test --test sherpaonnx_live --no-default-features --features sherpaonnx -- --ignored --nocapture --test-threads=1
